name: CI
on:
    push: 
        branches: [main]
jobs:
    code-lint:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: Setup Node JS
              uses: actions/setup-node@v4
              with: 
                node-version: '20.x'
                cache: 'npm'
                cache-dependency-path: frontend/package-lock.json
            - name: install packages
              run: npm install
              working-directory: frontend

            - name: Run Linter
              run: npm run lint
              working-directory: frontend
            
            - name: test
              run: npm run test
              working-directory: frontend

